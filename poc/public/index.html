<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Athena Web PoC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --blu: #388bfd;
      --opf: #f85149;
      --ind: #3fb950;
      --civ: #e3b341;
      --unk: #8b949e;
      --status-ok: #3fb950;
      --status-err: #f85149;
      --status-wait: #e3b341;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    #topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
    #status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--status-wait);
      flex-shrink: 0;
    }
    #status-dot.ok  { background: var(--status-ok); }
    #status-dot.err { background: var(--status-err); }

    #mission-info {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #mission-info span { color: var(--text); }

    #toggle-panel {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    /* ── Main area: canvas + sidebar ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Canvas ── */
    #map-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
    }
    #map-wrap:active { cursor: grabbing; }

    canvas#map {
      position: absolute;
      top: 0; left: 0;
    }

    /* ── No-data overlay ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      pointer-events: none;
    }
    #overlay.hidden { display: none; }
    #overlay .icon { font-size: 48px; }
    #overlay p { font-size: 13px; text-align: center; max-width: 260px; line-height: 1.5; }

    /* ── Unit tooltip ── */
    #tooltip {
      position: absolute;
      background: rgba(22,27,34,0.95);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      pointer-events: none;
      display: none;
      font-size: 12px;
      line-height: 1.7;
      max-width: 220px;
      z-index: 20;
    }
    #tooltip strong { font-size: 13px; display: block; margin-bottom: 2px; }

    /* ── Sidebar (unit list) ── */
    #sidebar {
      width: 220px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.2s;
    }
    #sidebar.collapsed { width: 0; }

    #sidebar-header {
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    #unit-list {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .unit-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-bottom: 1px solid rgba(48,54,61,0.5);
      font-size: 12px;
      cursor: pointer;
    }
    .unit-item:hover { background: rgba(255,255,255,0.04); }
    .unit-item:active { background: rgba(255,255,255,0.08); }

    .unit-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .unit-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .unit-type { color: var(--muted); font-size: 10px; }

    /* ── Debug panel ── */
    #debug {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      max-height: 180px;
      background: rgba(13,17,23,0.95);
      border-top: 1px solid var(--border);
      font-family: monospace;
      font-size: 11px;
      overflow-y: auto;
      padding: 6px 10px;
      display: none;
      z-index: 30;
    }
    #debug.visible { display: block; }
    .debug-line { color: var(--muted); line-height: 1.5; word-break: break-all; }
    .debug-line.info { color: var(--blu); }
    .debug-line.warn { color: var(--status-wait); }
    .debug-line.err  { color: var(--status-err); }

    /* Touch hint */
    #touch-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--muted);
      pointer-events: none;
      opacity: 0.6;
    }

    /* Legend */
    #legend {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(22,27,34,0.88);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
    }
    .legend-row { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    @media (max-width: 480px) {
      #sidebar { display: none !important; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <div id="status-dot"></div>
    <h1>Athena Web</h1>
    <div id="mission-info">
      <span id="map-name">—</span>
      <span id="game-time" style="color:var(--muted)"></span>
      <span id="game-date" style="color:var(--muted)"></span>
    </div>
    <button id="toggle-panel" onclick="toggleSidebar()">Units</button>
    <button id="toggle-debug" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;" onclick="toggleDebug()">Debug</button>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="map-wrap">
      <canvas id="map"></canvas>

      <!-- Overlay when no data -->
      <div id="overlay">
        <div class="icon">🗺️</div>
        <p id="overlay-msg">Waiting for relay connection…<br>Make sure Arma 3 is running with the Athena mod and Relay.exe is active.</p>
      </div>

      <!-- Legend -->
      <div id="legend">
        <div class="legend-row"><div class="legend-dot" style="background:var(--blu)"></div> BLUFOR</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--opf)"></div> OPFOR</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--ind)"></div> Independent</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--civ)"></div> Civilian</div>
      </div>

      <!-- Tooltip -->
      <div id="tooltip"></div>

      <div id="touch-hint">Pinch to zoom · Drag to pan</div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">Units (<span id="unit-count">0</span>)</div>
      <div id="unit-list"></div>
    </div>
  </div>
</div>

<!-- Debug log -->
<div id="debug"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────────
// v2 schema: side values are WEST / EAST / GUER / CIV
const SIDE_COLOR = {
  WEST:'#388bfd', BLUFOR:'#388bfd', BLU_F:'#388bfd',
  EAST:'#f85149', OPFOR:'#f85149',  OPF_F:'#f85149',
  GUER:'#3fb950', IND_F:'#3fb950',  INDEPENDENT:'#3fb950',
  CIV :'#e3b341', CIV_F:'#e3b341',  CIVILIAN:'#e3b341',
};
function sideColor(side) {
  if (!side) return '#8b949e';
  const key = (side + '').toUpperCase().replace(/-/g,'_');
  return SIDE_COLOR[key] || '#8b949e';
}

// Icon shapes per unit type
const ICON_SHAPE = {
  man: 'circle', infantry: 'circle',
  car: 'diamond', vehicle: 'diamond',
  tank: 'square',  tracked: 'square',
  heli: 'triangle', helicopter: 'triangle',
  plane: 'triangle', aircraft: 'triangle',
  ship: 'diamond', boat: 'diamond',
};
function iconShape(type) {
  if (!type) return 'circle';
  const t = type.toLowerCase();
  for (const [k,v] of Object.entries(ICON_SHAPE)) if (t.includes(k)) return v;
  return 'circle';
}

// ── WebSocket ──────────────────────────────────────────────────────────────────
const WS_URL = `ws://${location.host}`;
let ws, wsReconnectTimer;
let gameState = { connected: false, units: [], markers: [], groups: [] };

function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    dbg('WebSocket connected', 'info');
    clearTimeout(wsReconnectTimer);
  };

  ws.onmessage = ev => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    switch (msg.type) {
      case 'state':
        gameState = msg.data;
        onStateUpdate();
        break;
      case 'relayConnected':
        setStatus('ok', 'Relay connected');
        break;
      case 'relayDisconnected':
        setStatus('err', 'Relay disconnected — retrying…');
        document.getElementById('overlay-msg').textContent =
          'Relay disconnected. Make sure Arma 3 and Relay.exe are running.';
        break;
    }
  };

  ws.onclose = () => {
    dbg('WebSocket closed — reconnecting…', 'warn');
    setStatus('err', 'Disconnected');
    wsReconnectTimer = setTimeout(connectWS, 2000);
  };

  ws.onerror = () => dbg('WebSocket error', 'err');
}

// ── Raw frame fallback (Athena pipe string format) ────────────────────────────
// Relay may send comma/pipe-separated strings for unparsed frames.
// We do a best-effort parse to extract unit positions.
function parseRawFrame(raw) {
  // Sample format observed in similar mods:
  // [side,displayName,posX,posY,posZ,direction,speed,unitType,groupID,...]
  // Try splitting on common delimiters
  const parts = raw.split(/[|,;\t]/);
  if (parts.length >= 4) {
    const x = parseFloat(parts[2]);
    const y = parseFloat(parts[3]);
    if (!isNaN(x) && !isNaN(y)) {
      gameState.units = [...(gameState.units || []), {
        DisplayName: parts[1] || '?',
        Side: parts[0],
        PosX: x, PosY: y, Direction: parseFloat(parts[5]) || 0
      }];
      onStateUpdate();
    }
  }
}

// ── State → UI ────────────────────────────────────────────────────────────────
function onStateUpdate() {
  const units = gameState.units || [];
  const hasData = units.length > 0 || (gameState.markers || []).length > 0;

  document.getElementById('overlay').classList.toggle('hidden', hasData);
  document.getElementById('unit-count').textContent = units.length;

  if (gameState.worldName) {
    document.getElementById('world-name').textContent = gameState.worldName;
  }
  if (gameState.connected !== undefined) {
    setStatus(gameState.connected ? 'ok' : 'err',
              gameState.connected ? 'Relay connected' : 'Relay disconnected');
  }

  renderSidebar(units);
  renderMap();
}

// ── Map / Canvas ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('map');
const ctx    = canvas.getContext('2d');

let mapOffset = { x: 0, y: 0 };
let mapScale  = 1;
let mapBounds = { minX: 0, maxX: 30720, minY: 0, maxY: 30720 }; // Altis default

// Viewport transform
function worldToCanvas(wx, wy) {
  const nx = (wx - mapBounds.minX) / (mapBounds.maxX - mapBounds.minX);
  const ny = 1 - (wy - mapBounds.minY) / (mapBounds.maxY - mapBounds.minY);
  return {
    x: (nx * canvas.width  + mapOffset.x) * mapScale,
    y: (ny * canvas.height + mapOffset.y) * mapScale,
  };
}

function resizeCanvas() {
  const wrap = document.getElementById('map-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  renderMap();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function renderMap() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Grid background
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, w, h);

  // Grid lines
  ctx.strokeStyle = 'rgba(48,54,61,0.4)';
  ctx.lineWidth = 0.5;
  const GRID = 10;
  for (let i = 0; i <= GRID; i++) {
    const x = (w / GRID) * i, y = (h / GRID) * i;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }

  // v2 schema: positions come from UnitUpdates merged into units as posx/posy
  const units = gameState.units || [];
  const withPos = units.filter(u => u.posx || u.posy);
  if (withPos.length > 0) {
    const xs = withPos.map(u => u.posx);
    const ys = withPos.map(u => u.posy);
    const pad = 500;
    mapBounds = {
      minX: Math.min(...xs) - pad,
      maxX: Math.max(...xs) + pad,
      minY: Math.min(...ys) - pad,
      maxY: Math.max(...ys) + pad,
    };
  }

  // Units
  for (const u of units) {
    drawUnit(u);
  }
}

function drawUnit(u) {
  // v2 schema: posx/posy from merged UnitUpdates, side from Units
  const px = u.posx;
  const py = u.posy;
  if (!px && !py) return;

  const pos   = worldToCanvas(px, py);
  const color = sideColor(u.side || u.faction);
  const shape = iconShape(u.type || '');
  const dir   = ((u.dir || 0) * Math.PI) / 180;
  const R     = 7;

  ctx.save();
  ctx.translate(pos.x, pos.y);

  // Direction arrow
  if (u.dir !== undefined) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.sin(dir) * R * 1.8, -Math.cos(dir) * R * 1.8);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Shape
  ctx.fillStyle = color;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  switch (shape) {
    case 'circle':
      ctx.arc(0, 0, R, 0, Math.PI * 2);
      break;
    case 'square':
      ctx.rect(-R, -R, R * 2, R * 2);
      break;
    case 'diamond':
      ctx.moveTo(0, -R * 1.2);
      ctx.lineTo(R, 0);
      ctx.lineTo(0, R * 1.2);
      ctx.lineTo(-R, 0);
      ctx.closePath();
      break;
    case 'triangle':
      ctx.moveTo(0, -R * 1.3);
      ctx.lineTo(R * 1.1, R * 0.9);
      ctx.lineTo(-R * 1.1, R * 0.9);
      ctx.closePath();
      break;
  }
  ctx.fill();
  ctx.stroke();

  // Label: v2 uses u.name (player name or unit name)
  const label = u.player || u.name || '';
  if (label) {
    ctx.fillStyle = '#e6edf3';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, 0, R + 12);
  }

  ctx.restore();
}

// ── Sidebar ────────────────────────────────────────────────────────────────────
function renderSidebar(units) {
  const list = document.getElementById('unit-list');
  list.innerHTML = '';
  // Sort: players first, then by side
  const sorted = [...units].sort((a,b) => (b.player?1:0) - (a.player?1:0));
  for (const u of sorted) {
    const item = document.createElement('div');
    item.className = 'unit-item';
    const color = sideColor(u.side || u.faction);
    const label = u.player || u.name || '—';
    const isPlayer = !!u.player;
    item.innerHTML = `
      <div class="unit-dot" style="background:${color}"></div>
      <div class="unit-name" style="${isPlayer ? 'font-weight:600' : ''}">${esc(label)}</div>
      <div class="unit-type">${esc(u.rank || '')}</div>`;
    item.onclick = () => focusUnit(u);
    list.appendChild(item);
  }
}

function focusUnit(u) {
  if (!u.posx && !u.posy) return;
  const pos = worldToCanvas(u.posx, u.posy);
  showTooltip(pos.x, pos.y, u);
}

// ── Tooltip ────────────────────────────────────────────────────────────────────
let tooltipTimer;
function showTooltip(x, y, u) {
  const tip = document.getElementById('tooltip');
  // v2 schema field names
  tip.innerHTML = `
    <strong>${esc(u.player || u.name || '—')}</strong>
    Side: ${esc(u.side || '—')} &nbsp; Faction: ${esc(u.faction || '—')}<br>
    Class: ${esc(u.type || '—')}<br>
    Rank: ${esc(u.rank || '—')}<br>
    Pos: ${(u.posx||0).toFixed(0)}, ${(u.posy||0).toFixed(0)} (z ${(u.posz||0).toFixed(0)})<br>
    Dir: ${(u.dir||0).toFixed(1)}° &nbsp; Speed: ${(u.speed||0).toFixed(1)} m/s<br>
    Group: ${esc(u.groupnetid || '—')}`;

  const mw = document.getElementById('map-wrap');
  const tx = Math.min(x + 12, mw.clientWidth  - 230);
  const ty = Math.min(y - 10, mw.clientHeight - 120);
  tip.style.left    = Math.max(0, tx) + 'px';
  tip.style.top     = Math.max(0, ty) + 'px';
  tip.style.display = 'block';

  clearTimeout(tooltipTimer);
  tooltipTimer = setTimeout(() => { tip.style.display = 'none'; }, 4000);
}

// ── Map pan / zoom ─────────────────────────────────────────────────────────────
let drag = null;

document.getElementById('map-wrap').addEventListener('pointerdown', e => {
  drag = { sx: e.clientX - mapOffset.x, sy: e.clientY - mapOffset.y };
  document.getElementById('tooltip').style.display = 'none';
});
document.getElementById('map-wrap').addEventListener('pointermove', e => {
  if (!drag) return;
  mapOffset.x = e.clientX - drag.sx;
  mapOffset.y = e.clientY - drag.sy;
  renderMap();
});
document.getElementById('map-wrap').addEventListener('pointerup', () => { drag = null; });

// Tap/click a unit dot to show tooltip
document.getElementById('map-wrap').addEventListener('click', e => {
  const units = gameState.units || [];
  for (const u of units) {
    if (!u.posx && !u.posy) continue;
    const pos = worldToCanvas(u.posx, u.posy);
    const dx = pos.x - e.offsetX, dy = pos.y - e.offsetY;
    if (Math.sqrt(dx*dx+dy*dy) < 14) { showTooltip(e.offsetX, e.offsetY, u); return; }
  }
  document.getElementById('tooltip').style.display = 'none';
});

// Pinch zoom
let lastPinchDist = null;
document.getElementById('map-wrap').addEventListener('touchstart', e => {
  if (e.touches.length === 2) { lastPinchDist = pinchDist(e); e.preventDefault(); }
}, { passive: false });
document.getElementById('map-wrap').addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const d = pinchDist(e);
    if (lastPinchDist) mapScale = Math.max(0.3, Math.min(8, mapScale * (d / lastPinchDist)));
    lastPinchDist = d;
    renderMap();
    e.preventDefault();
  }
}, { passive: false });
document.getElementById('map-wrap').addEventListener('touchend', () => { lastPinchDist = null; });
document.getElementById('map-wrap').addEventListener('wheel', e => {
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  mapScale = Math.max(0.3, Math.min(8, mapScale * factor));
  renderMap();
  e.preventDefault();
}, { passive: false });

function pinchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

// ── Debug log ──────────────────────────────────────────────────────────────────
const debugEl = document.getElementById('debug');
let debugVisible = false;
function dbg(msg, cls = '') {
  const line = document.createElement('div');
  line.className = 'debug-line ' + cls;
  line.textContent = new Date().toISOString().slice(11,19) + '  ' + msg;
  debugEl.prepend(line);
  if (debugEl.children.length > 80) debugEl.removeChild(debugEl.lastChild);
}
function toggleDebug() {
  debugVisible = !debugVisible;
  debugEl.classList.toggle('visible', debugVisible);
}

// ── Sidebar toggle ─────────────────────────────────────────────────────────────
let sidebarOpen = true;
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  setTimeout(resizeCanvas, 210);
}

// ── Status dot ────────────────────────────────────────────────────────────────
function setStatus(state, msg) {
  const dot = document.getElementById('status-dot');
  dot.className = state;  // 'ok', 'err', or '' (yellow)
  dbg(msg, state === 'ok' ? 'info' : state === 'err' ? 'err' : 'warn');
}

// ── Utils ──────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Boot ───────────────────────────────────────────────────────────────────────
connectWS();
setInterval(renderMap, 500); // re-render even with static data to keep things fresh
</script>
</body>
</html>
